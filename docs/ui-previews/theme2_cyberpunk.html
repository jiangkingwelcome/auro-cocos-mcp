<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
/* Theme 2: Cyberpunk Geek (Monospace, Neon borders, Grids) */
:root {
  --bg-base: #050505;
  --bg-panel: #0a0a0c;
  --border-color: #1f2937;
  --blur-border: rgba(167, 139, 250, 0.3);
  --text-main: #d1d5db;
  --text-muted: #6b7280;
  --neon-green: #34d399;
  --neon-purple: #a78bfa;
  --neon-blue: #38bdf8;
}

body {
  background: var(--bg-base);
  color: var(--text-main);
  font-family: 'JetBrains Mono', Consolas, monospace;
  padding: 20px;
  display: flex;
  justify-content: center;
  background-image: 
    linear-gradient(rgba(167, 139, 250, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(167, 139, 250, 0.05) 1px, transparent 1px);
  background-size: 20px 20px;
}

.mcp-panel {
  width: 400px;
  border: 1px solid var(--border-color);
  background: rgba(10, 10, 12, 0.9);
  backdrop-filter: blur(10px);
  border-top: 2px solid var(--neon-purple);
  box-shadow: 0 0 30px rgba(167, 139, 250, 0.1);
}

.mcp-tabs-header {
  display: flex;
  border-bottom: 1px solid var(--border-color);
}

.mcp-tab {
  flex: 1; text-align: center; padding: 12px 0; font-size: 12px; text-transform: uppercase;
  color: var(--text-muted); cursor: pointer; transition: 0.2s; letter-spacing: 1px;
}
.mcp-tab.active { color: var(--neon-green); font-weight: bold; text-shadow: 0 0 8px rgba(52,211,153,0.4); border-bottom: 2px solid var(--neon-green); }

.mcp-tabs-container { padding: 20px; }

.s3-bento { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.s3-tile {
  background: rgba(0,0,0,0.5); border: 1px dashed var(--border-color);
  padding: 14px; display: flex; flex-direction: column;
}
.s3-tile:hover { border-style: solid; border-color: var(--blur-border); background: rgba(167,139,250,0.05); }
.s3-tile.wide { grid-column: span 2; }

.s3-tile-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
.s3-tile-value { font-size: 24px; font-weight: bold; }

.val-blue { color: var(--neon-blue); text-shadow: 0 0 10px rgba(56,189,248,0.5); }
.val-green { color: var(--neon-green); text-shadow: 0 0 10px rgba(52,211,153,0.5); }
.val-purple { color: var(--neon-purple); text-shadow: 0 0 10px rgba(167,139,250,0.5); }

.s3-tile-sub { font-size: 11px; color: var(--text-muted); margin-top: 10px; display: flex; align-items: center; gap: 6px; }

.btn {
  width: 100%; padding: 10px; font-size: 12px; font-family: inherit; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
  cursor: pointer; border: 1px solid var(--border-color); background: transparent; color: var(--text-main);
  transition: 0.2s;
}
.btn:hover { border-color: var(--text-main); color: #fff; }
.btn-primary { background: rgba(52,211,153,0.1); color: var(--neon-green); border-color: var(--neon-green); }
.btn-primary:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px rgba(52,211,153,0.5); }

.status-dot { width: 8px; height: 8px; background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); border-radius: 0; }
.status-text { color: var(--neon-green); }
code { background: transparent; border: 1px dotted var(--text-muted); padding: 2px 4px; font-size: 10px; color: var(--text-main); }
</style>
</head>
<body>
<div class="mcp-panel">
  <div class="mcp-tabs-header">
    <div class="mcp-tab active">SYS_STAT</div>
    <div class="mcp-tab">CTRL</div>
    <div class="mcp-tab">CFG</div>
  </div>
  <div class="mcp-tabs-container">
    <div style="font-size:11px; color:var(--text-muted); margin-bottom:12px;">> INITIALIZING AURA NODE... OK</div>
    <div class="s3-bento">
      <div class="s3-tile wide">
        <div class="s3-tile-label">ENV.PROJECT_ID</div>
        <div class="s3-tile-value" style="color:#fff">SuperCocosGame</div>
        <div class="s3-tile-sub"><span>[cc_3.8.3]</span> <code style="margin-left:auto">/usr/dev</code></div>
      </div>
      <div class="s3-tile">
        <div class="s3-tile-label">MOD.TOOLS</div>
        <div class="s3-tile-value val-blue">22_</div>
        <div class="s3-tile-sub">loaded</div>
      </div>
      <div class="s3-tile">
        <div class="s3-tile-label">MOD.ACTIONS</div>
        <div class="s3-tile-value val-green">275_</div>
        <div class="s3-tile-sub">mapped</div>
      </div>
      <div class="s3-tile wide">
        <div class="s3-tile-label">NET.CONNECTION</div>
        <div class="s3-tile-value val-purple">LINK_ESTABLISHED</div>
        <div class="s3-tile-sub">
          <span class="status-dot"></span><span class="status-text">PORT::8080</span>
        </div>
      </div>
    </div>
    <div style="margin-top: 20px; display:flex; gap:10px;">
      <button class="btn btn-primary">> EXECUTE_RESTART</button>
      <button class="btn">> SETTINGS</button>
    </div>
  </div>
</div>
</body>
</html>
