<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Theme: Aurora</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #060612;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  padding: 40px;
  /* Noise texture overlay for premium feel */
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}

/* Animated Aurora Background */
.aurora-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.aurora-blob {
  position: absolute; border-radius: 50%;
  filter: blur(80px);
  animation: aurora-drift 8s ease-in-out infinite alternate;
}
.aurora-blob:nth-child(1) {
  width: 500px; height: 300px; background: rgba(99, 102, 241, 0.2);
  top: -100px; left: -100px; animation-delay: 0s;
}
.aurora-blob:nth-child(2) {
  width: 400px; height: 400px; background: rgba(16, 185, 129, 0.15);
  top: 30%; right: -150px; animation-delay: -3s;
}
.aurora-blob:nth-child(3) {
  width: 350px; height: 250px; background: rgba(244, 63, 94, 0.1);
  bottom: -50px; left: 20%; animation-delay: -5s;
}
@keyframes aurora-drift {
  from { transform: translate(0, 0) scale(1); }
  to { transform: translate(40px, 30px) scale(1.1); }
}

.panel {
  position: relative; z-index: 1;
  width: 400px;
  background: rgba(255, 255, 255, 0.025);
  backdrop-filter: blur(40px) saturate(150%);
  -webkit-backdrop-filter: blur(40px) saturate(150%);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04),
    0 24px 48px rgba(0,0,0,0.5),
    0 4px 16px rgba(0,0,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.12),
    inset 0 -1px 0 rgba(0,0,0,0.2);
  overflow: hidden;
}

/* Gradient top edge glow (Aura signature) */
.panel-topper {
  height: 1px;
  background: linear-gradient(90deg, transparent, #6366f1 20%, #10b981 50%, #f43f5e 80%, transparent);
  opacity: 0.8;
}

/* Header */
.panel-header {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 20px 0;
}
.logo {
  width: 28px; height: 28px; border-radius: 8px;
  background: conic-gradient(from 0deg, #6366f1, #10b981, #f43f5e, #6366f1);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; box-shadow: 0 2px 8px rgba(99,102,241,0.4);
}
.brand { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
.brand span { font-size: 11px; color: rgba(255,255,255,0.35); font-weight: 400; margin-left: 4px; }
.edition-pill {
  margin-left: auto; font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
  padding: 4px 9px; border-radius: 20px;
  background: linear-gradient(to right, rgba(99,102,241,0.25), rgba(16,185,129,0.15));
  border: 1px solid rgba(99,102,241,0.3);
  color: #a5b4fc;
}

/* Navigation tabs */
.nav {
  display: flex; gap: 2px; padding: 14px 20px 0;
}
.nav-item {
  flex: 1; text-align: center; font-size: 12.5px; font-weight: 500;
  color: rgba(255,255,255,0.3); padding: 8px 4px;
  border-radius: 8px; cursor: pointer; transition: all 0.2s;
}
.nav-item:hover { color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.04); }
.nav-item.active { color: #fff; background: rgba(255,255,255,0.08); }

.divider-line {
  height: 1px; background: rgba(255,255,255,0.05); margin: 14px 0 0;
}

/* Content */
.content { padding: 20px; display: flex; flex-direction: column; gap: 14px; }

/* Status bar */
.status-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 12px;
  background: rgba(16, 185, 129, 0.07);
  border: 1px solid rgba(16, 185, 129, 0.18);
}
.beacon {
  width: 8px; height: 8px; border-radius: 50%; background: #10b981;
  animation: beacon 2.5s infinite;
  box-shadow: 0 0 0 0 rgba(16,185,129,0.6);
  flex-shrink: 0;
}
@keyframes beacon {
  0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.6); }
  70% { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
  100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
}
.status-text { font-size: 12.5px; color: #6ee7b7; font-weight: 500; }
.status-meta { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.2); }

/* Bento grid */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px; padding: 16px;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  cursor: default;
  position: relative; overflow: hidden;
}
.card::after {
  content: ''; position: absolute;
  inset: -1px; border-radius: 14px;
  background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 100%);
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
.card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.12); }
.card:hover::after { opacity: 1; }

.card-full { grid-column: span 2; }
.card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.3); margin-bottom: 10px; font-weight: 600; }
.card-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 36px; font-weight: 500; line-height: 1;
}
.c-blue { color: #93c5fd; }
.c-teal { color: #5eead4; }
.c-purple { color: #c4b5fd; }
.card-sub { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 8px; }

.project-name { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 4px; letter-spacing: -0.4px; }
.project-meta { display: flex; gap: 8px; flex-wrap: wrap; }
.meta-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; padding: 3px 8px; border-radius: 6px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.4);
}

/* Toggle switch */
.row {
  display: flex; align-items: center;
  padding: 12px 16px; border-radius: 12px;
  background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
  gap: 12px;
}
.row-info { flex: 1; }
.row-title { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); }
.row-sub { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 2px; }
.toggle {
  width: 40px; height: 22px; border-radius: 22px; background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1); position: relative; cursor: pointer; flex-shrink: 0;
  transition: 0.3s;
}
.toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
  border-radius: 50%; background: rgba(255,255,255,0.4); transition: 0.3s cubic-bezier(0.68,-0.55,0.265,1.55);
}
.toggle.on { background: linear-gradient(to right, #6366f1, #10b981); border-color: transparent; box-shadow: 0 0 16px rgba(99,102,241,0.4); }
.toggle.on::after { transform: translateX(18px); background: #fff; }

/* Buttons */
.btn-row { display: flex; gap: 10px; }
.btn {
  flex: 1; padding: 11px; border-radius: 10px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.25s; border: none; font-family: 'Inter', sans-serif;
}
.btn-outline {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.7);
}
.btn-outline:hover { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.2); }
.btn-grad {
  background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #0ea5e9 100%);
  color: #fff;
  box-shadow: 0 4px 16px rgba(99,102,241,0.35);
  position: relative; overflow: hidden;
}
.btn-grad::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.btn-grad:hover::before { opacity: 1; }
.btn-grad:hover { box-shadow: 0 6px 24px rgba(99,102,241,0.5); transform: translateY(-1px); }

/* Footer */
.panel-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px 14px;
  border-top: 1px solid rgba(255,255,255,0.04);
}
.version { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.2); }
.footer-actions { display: flex; gap: 8px; }
.ghost-btn {
  font-size: 11px; color: rgba(255,255,255,0.25); cursor: pointer;
  padding: 4px 8px; border-radius: 6px; border: none;
  background: transparent; font-family: 'Inter', sans-serif; transition: 0.2s;
}
.ghost-btn:hover { color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.05); }
</style>
</head>
<body>

<div class="aurora-bg">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>

<div class="panel">
  <div class="panel-topper"></div>

  <div class="panel-header">
    <div class="logo">✦</div>
    <div class="brand">Aura <span>for Cocos</span></div>
    <div class="edition-pill">PRO</div>
  </div>

  <div class="nav">
    <div class="nav-item active">状态</div>
    <div class="nav-item">控制</div>
    <div class="nav-item">互联</div>
    <div class="nav-item">设置</div>
    <div class="nav-item">指南</div>
  </div>
  <div class="divider-line"></div>

  <div class="content">

    <div class="status-bar">
      <div class="beacon"></div>
      <div class="status-text">Aura MCP Runtime Active</div>
      <div class="status-meta">:8080</div>
    </div>

    <div class="grid">
      <div class="card card-full">
        <div class="card-label">Active Project</div>
        <div class="project-name">SuperCocosGame</div>
        <div class="project-meta">
          <span class="meta-chip">cc 3.8.3</span>
          <span class="meta-chip">E:/dev/game</span>
          <span class="meta-chip">uptime 03:21</span>
        </div>
      </div>

      <div class="card">
        <div class="card-label">Tools</div>
        <div class="card-num c-blue">22</div>
        <div class="card-sub">exposed</div>
      </div>

      <div class="card">
        <div class="card-label">Actions</div>
        <div class="card-num c-teal">275</div>
        <div class="card-sub">callable</div>
      </div>
    </div>

    <div class="row">
      <div class="row-info">
        <div class="row-title">Auto Rollback</div>
        <div class="row-sub">Recover scene on AI failure</div>
      </div>
      <div class="toggle on" onclick="this.classList.toggle('on')"></div>
    </div>
    <div class="row">
      <div class="row-info">
        <div class="row-title">Localhost Restrict</div>
        <div class="row-sub">Bind to 127.0.0.1 only</div>
      </div>
      <div class="toggle on" onclick="this.classList.toggle('on')"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-outline">Stop</button>
      <button class="btn btn-grad">↻ Restart Aura</button>
    </div>

  </div>

  <div class="panel-footer">
    <div class="version">v1.0.10</div>
    <div class="footer-actions">
      <button class="ghost-btn">中/EN</button>
      <button class="ghost-btn">同步状态</button>
    </div>
  </div>
</div>

</body>
</html>
